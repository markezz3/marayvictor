<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Mara ❤️ Víctor</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg,
                    #fff8f8,
                    #fff0f5,
                    #fef9f0);
            font-family: "Segoe UI", sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
        }

        h1 {
            font-size: 4rem;
            color: #333;
            margin-bottom: 20px;
            animation: flotar 3s ease-in-out infinite;
        }

        .corazon {
            display: inline-block;
            animation: latido 1.2s infinite;
        }

        .proximamente {
            font-size: 1.4rem;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: #777;
            animation: aparecer 2s ease;
        }

        .linea {
            width: 200px;
            height: 2px;
            background: #d4af37;
            margin: 30px auto;
            animation: crecer 2s ease;
        }

        @keyframes latido {
            0% {
                transform: scale(1);
            }

            25% {
                transform: scale(1.2);
            }

            50% {
                transform: scale(1);
            }

            75% {
                transform: scale(1.2);
            }

            100% {
                transform: scale(1);
            }
        }

        @keyframes flotar {
            0% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }

            100% {
                transform: translateY(0);
            }
        }

        @keyframes aparecer {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes crecer {
            from {
                width: 0;
            }

            to {
                width: 200px;
            }
        }

        .firma {
            margin-top: 30px;
            color: #999;
            font-size: .9rem;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>
            Mara
            <span class="corazon">❤️</span>
            Víctor
        </h1>

        <div class="linea"></div>

        <div class="proximamente">
            Próximamente
        </div>

        <div class="firma">
            Nuestra historia apenas comienza...
        </div>

    </div>

</body>

</html>
